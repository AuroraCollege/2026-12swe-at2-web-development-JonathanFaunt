<!doctype html>
<html lang="en">

<head>
  <title>{% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">
<nav class="navbar navbar-expand-lg navbar-dark bg-black mb-4">
<div class="container-fluid">

    <a class="navbar-brand" href="/">Fauntboard</a>

        <ul class="navbar-nav ms-auto d-flex flex-row">

      {% if g.user %}
        {% if g.user and g.user['role'] == 'Moderator' %}
          <li class="nav-item">
            <span class="badge bg-success ms-2">Mod</span>
          </li>
        {% endif %}
        <li class="nav-item mx-3, mt-2">
          <span class="navbar-text">{{ g.user['username'] }}</span>
        </li>
        <li class="nav-item mx-3">
          <a class="nav-link" href="{{ url_for('logout') }}">Log Out</a>
        </li>
      {% else %}
        <li class="nav-item mx-3">
          <a class="nav-link" href="{{ url_for('register') }}">Register</a>
        </li>
        <li class="nav-item mx-3">
          <a class="nav-link" href="{{ url_for('login') }}">Log In</a>
        </li>
      {% endif %}

    </ul>

  </div>
</nav>
<section class="content">
  <header>
    {% block header %}{% endblock %}
  </header>
  {% block content %}{% endblock %}
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
