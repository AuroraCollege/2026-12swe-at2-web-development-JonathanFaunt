{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height: 50vh;">
<div class="card p-4 bg-white text-center" style="width: 500px;">
  <h1 class="text-primary">Login</h1>
  <form method="post">
    <h2 for="username">Username</label>
    <div class="text-center"><input name="username" id="username" required></div>
    <h2 for="password">Password</label>
    <div class="text-center"><input type="password" name="password" id="password" required></div>
    <div class="text-center mt-4"><input type="submit" value="Login"></div>
  </form>
</div>
</div>
<div class="text-light text-center mt-3">
  <p>Don't have an account? <a href="{{ url_for('register') }}">Register here!</a></p>
</div>
{% endblock %}
