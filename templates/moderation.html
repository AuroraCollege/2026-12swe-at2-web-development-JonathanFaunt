{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="height: 15vh;">
  <div class="card p-4 bg-white" style="width: 1500px;">
    <h1 class="text-primary">Moderation</h1>
    <p class="text-dark">Pick from the tools below.</p>
  </div>
</div>

<ul class="list-group mt-2">
  <li class="list-group-item bg-dark">
    <a class="btn btn-outline-info w-100" href="{{ url_for('new_leaderboard') }}">
      Create New Leaderboard
    </a>
  </li>

  <li class="list-group-item bg-dark">
    <a class="btn btn-outline-warning w-100" href="{{ url_for('manage_submissions') }}">
      Remove Submissions
    </a>
  </li>

  <li class="list-group-item bg-dark">
    <a class="btn btn-outline-danger w-100" href="{{ url_for('manage_users') }}">
      Delete User Accounts
    </a>
  </li>
</ul>

{% endblock %}
