{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height: 15vh;">
  <div class="card p-4 bg-white" style="width: 1500px;">
    <h1 class="text-primary">Manage Users</h1>
  </div>
</div>

  <table class="table table-dark table-striped table-bordered mt-3">
    <thead>
      <tr>
        <th>Username</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      {% for user in users %}
      <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.role }}</td>
        <td>
          {% if user.role != 'Moderator' %}
          <a href="{{ url_for('delete_user', user_id=user.id) }}"
             class="btn btn-danger btn-sm">
            Delete
          </a>
          {% else %}
          <span class="text-secondary">Protected</span>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
